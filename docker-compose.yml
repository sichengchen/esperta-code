services:
  esperta-code:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "3421:3421"   # Linear webhook + OAuth callback
    volumes:
      - ${SSH_AUTH_SOCK}:/ssh-agent:ro
      - ~/.ssh/known_hosts:/home/feliz/.ssh/known_hosts:ro
      - esperta-code-data:/data/esperta-code
      - esperta-code-config:/home/feliz/.esperta-code
      - esperta-code-agent-local:/home/feliz/.local
      - esperta-code-npm-global:/home/feliz/.npm-global
      - esperta-code-claude-config:/home/feliz/.claude
      - esperta-code-codex-config:/home/feliz/.codex
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - LINEAR_OAUTH_TOKEN
      - GITHUB_TOKEN
      - GH_TOKEN=${GITHUB_TOKEN}
      - GIT_AUTHOR_NAME
      - GIT_AUTHOR_EMAIL
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    restart: unless-stopped

volumes:
  esperta-code-data:
  esperta-code-config:
  esperta-code-agent-local:
  esperta-code-npm-global:
  esperta-code-claude-config:
  esperta-code-codex-config:
